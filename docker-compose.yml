services:

  db:
    image: postgres:16
    container_name: ptmk_postgres
    restart: always

    environment:
      POSTGRES_DB: ptmk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ptmk"]
      interval: 5s
      timeout: 5s
      retries: 5


  api:
    build: .
    container_name: ptmk_api
    restart: always

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/ptmk


volumes:
  postgres_data: